x-flowise: &flowise
  image: flowiseai/flowise:latest
  container_name: flowise
  restart: unless-stopped
  ports:
    - "3002:3002"
  volumes:
    - ../../.localai/data/services/flowise:/root/.flowise
  labels:
    traefik.enable: true
    traefik.http.routers.flowise.rule: Host(`flowise.localhost`)
    traefik.http.routers.flowise.entrypoints: web, websecure
    traefik.http.services.flowise.loadbalancer.server.port: 3002
services:
  flowise:
    <<: *flowise
