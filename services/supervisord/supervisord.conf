; Supervisord configuration for LocalAI Stack
; This file defines the main supervisor daemon settings and includes program configurations.

[unix_http_server]
file=/var/run/supervisor.sock   ; path to the socket file
chmod=0700                      ; socket file mode (default 0700)

[supervisord]
logfile=/var/log/supervisor/supervisord.log ; main log file
logfile_maxbytes=50MB                        ; max size before rotation
logfile_backups=10                           ; number of rotated logs
loglevel=info                                ; log level
pidfile=/var/run/supervisord.pid             ; pid file location
nodaemon=false                               ; run in foreground (inside container)
minfds=1024                                  ; minimum file descriptors
minprocs=200                                 ; minimum process descriptors

; Enable the web interface
[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock ; use a unix socket for supervisorctl

; Web interface configuration
[inet_http_server]
port=0.0.0.0:9001          ; bind to all interfaces on port 9001
username=admin             ; default username (change in production)
password=localai           ; default password (change in production)

; Include program configurations from conf.d directory
[include]
files = /etc/supervisor/conf.d/*.conf