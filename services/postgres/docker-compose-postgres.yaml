x-postgres: &postgres
  image: postgres:16
  container_name: postgres
  restart: unless-stopped

  ports:
    - "5432:5432"

  volumes:
    - ${LOCALAI_DATA:-../.LocalAI}/data/postgres:/var/lib/postgresql/data

  environment:
    - POSTGRES_DB=${POSTGRES_DB:-localai}
    - POSTGRES_USER=${POSTGRES_USER:-localai}
    - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-localai}
    - TZ=UTC

  labels:
    traefik.enable: false

services:
  postgres:
    <<: *postgres
