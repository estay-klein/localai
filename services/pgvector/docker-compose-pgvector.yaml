x-pgvector: &pgvector
  image: pgvector/pgvector:pg16
  container_name: pgvector
  restart: unless-stopped

  ports:
    - "5434:5432"

  volumes:
    - ../../.localai/data/services/pgvector:/var/lib/postgresql/data

  environment:
    - POSTGRES_DB=${PGVECTOR_DB:-vector}
    - POSTGRES_USER=${PGVECTOR_USER:-vector}
    - POSTGRES_PASSWORD=${PGVECTOR_PASSWORD:-vector}
    - TZ=UTC

  labels:
    traefik.enable: false

services:
  pgvector:
    <<: *pgvector
