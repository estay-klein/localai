x-openwebui-gpu: &openwebui-gpu
  image: ghcr.io/open-webui/open-webui:latest
  container_name: openwebui-gpu
  restart: unless-stopped
  depends_on:
    - traefik
    - ollama-gpu
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]
  ports:
    - "3031:8080"
  extra_hosts:
    - "host.docker.internal:host-gateway"
  volumes:
    - ${LOCALAI_DATA:-../.LocalAI}/services/openwebui-gpu:/app/backend/data
  labels:
    traefik.enable: true
    traefik.http.routers.openwebui-gpu.rule: Host(`open-gpu.localhost`)
    traefik.http.routers.openwebui-gpu.entrypoints: web, websecure
    traefik.http.services.openwebui-gpu.loadbalancer.server.port: 8080
    traefik.http.services.openwebui-gpu.loadbalancer.passhostheader: true
    traefik.http.services.openwebui-gpu.loadbalancer.responseForwarding.flushInterval: -1
    traefik.http.routers.openwebui-gpu.middlewares: ia-streaming-gpu
    traefik.http.middlewares.ia-streaming-gpu.buffering.maxResponseBodyBytes: 0
    traefik.http.middlewares.ia-streaming-gpu.buffering.maxRequestBodyBytes: 0
    traefik.http.middlewares.ia-streaming-gpu.buffering.memResponseBodyBytes: 0

services:
  openwebui-gpu:
    profiles: ["gpu-nvidia"]
    <<: *openwebui-gpu
    environment:
      - OLLAMA_BASE_URL=http://ollama-gpu:11434
      - WEBUI_SECRET_KEY=localai
      - USE_CUDA_DOCKER=true
      - DEFAULT_MODELS=qwen2.5:1.5b
      - DEFAULT_LOCALE=en-US
      - CHECK_UPDATE=false
      - SHOW_ADMIN_DETAILS=false
      - ENABLE_IMAGE_GENERATION=true
      - IMAGE_GENERATION_ENGINE=stable-diffusion
      - STABLE_DIFFUSION_BASE_URL=http://stable-diffusion:7860
      - SDWEBUI_BASE_URL=http://stable-diffusion:7860
      - DEFAULT_IMAGE_MODEL=anything-v5-PrtRE.safetensors

  # --- COMFY UI ---
  comfyui:
    image: ghcr.io/ai-dock/comfyui:latest-cuda
    container_name: comfyui
    profiles: ["gpu-nvidia"]
    restart: unless-stopped
    ports:
      - "8188:8188"
    environment:
      - WEB_ENABLE_AUTH=false
      - NVIDIA_VISIBLE_DEVICES=all
      - COMFYUI_FLAGS=--xformers --fp8_base # Optimización para RTX 4060
    volumes:
      - ./services/comfyui/models:/opt/ComfyUI/models
      - ./services/comfyui/output:/opt/ComfyUI/output
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # --- STABLE DIFFUSION WEBUI (A1111) ---
  stable-diffusion:
    image: ghcr.io/ai-dock/stable-diffusion-webui:latest-cuda
    container_name: stable-diffusion
    profiles: ["gpu-nvidia"]
    restart: unless-stopped
    ports:
      - "7860:7860"
    environment:
      - WEB_ENABLE_AUTH=false
      - NVIDIA_VISIBLE_DEVICES=all
      - CLI_ARGS=--xformers --medvram-sdxl --api --listen # medvram es clave para 8GB
    volumes:
      - ./services/sd-webui/models:/opt/stable-diffusion-webui/models
      - ./services/sd-webui/outputs:/opt/stable-diffusion-webui/outputs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
